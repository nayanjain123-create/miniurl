<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(
                135deg,
                #667eea,
                #764ba2
            );
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 15px;
            font-size: 36px;
        }

        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        button {
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: #f4f7ff;
            border-radius: 12px;
            border: 1px solid #dbe4ff;
        }

        .result-box h3 {
            margin-bottom: 12px;
            color: #333;
        }

        .short-link {
            display: inline-block;
            text-decoration: none;
            color: #667eea;
            font-weight: bold;
            word-break: break-all;
            transition: 0.3s;
        }

        .short-link:hover {
            color: #5a67d8;
            text-decoration: underline;
        }

        .footer {
            margin-top: 25px;
            color: #888;
            font-size: 14px;
        }

        @media (max-width: 600px) {

            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 28px;
            }
        }

    </style>
</head>
<body>

    <div class="container">

        <h1>🔗 URL Shortener</h1>

        <p>
            Convert long URLs into short and shareable links instantly.
        </p>

        <form action="/" method="POST">

            <input
                type="url"
                name="original_url"
                placeholder="Enter your long URL here..."
                required
            >

            <button type="submit">
                Shorten URL
            </button>

        </form>

        {% if short_url %}

        <div class="result-box">

            <h3>Your Short URL</h3>

            <a
                href="{{ short_url }}"
                target="_blank"
                class="short-link"
            >
                {{ short_url }}
            </a>
            
            <img src="{{ qrcode_path }}" alt="QR Code" style="margin-top: 20px; width: 220px; height: 220px;">
        </div>

        {% endif %}

        <div class="footer">
            Made with Flask 🚀
        </div>

    </div>

</body>
</html>
